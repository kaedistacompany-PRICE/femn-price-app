name: Update price history

on:
  push:
    branches: [main]
    paths:
      - "data.json"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run snapshot script
        run: node scripts/update-history.js

      - name: Commit updated history.json
        run: |
          git config user.name "price-history-bot"
          git config user.email "actions@github.com"
          git add history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update price history [skip ci]"
            git push
          fi
